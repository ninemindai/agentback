name: Deploy Worker (Cloudflare)

# Builds website/dist and deploys the agentback.dev Worker (Workers Static
# Assets + markdown negotiation, see website/edge/). This is the site's deploy
# pipeline — Cloudflare serves the uploaded assets; GitHub Pages is no longer
# the origin (pages.yml retired). Auto-runs on content changes; also dispatchable
# manually. Needs the CLOUDFLARE_API_TOKEN secret (account token agentback-ci).
on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: node website/build.mjs
      # Run wrangler via npx (isolated install) rather than
      # cloudflare/wrangler-action: the action does `npm i wrangler` which walks
      # up to the pnpm-workspace root package.json and fails ERESOLVE. npx
      # installs in its own cache, independent of the repo's deps.
      - name: Deploy Worker
        working-directory: website/edge
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@4.103.0 deploy
