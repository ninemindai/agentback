name: Deploy Worker (Cloudflare)

# Builds website/dist and deploys the agentback.dev Worker (Workers Static
# Assets + markdown negotiation, see website/edge/).
#
# Manual-only for now (workflow_dispatch): merging this branch must NOT cut the
# site over to Cloudflare-served by itself. Do the cutover deliberately —
# trigger this workflow (or run `wrangler deploy` locally) once the
# CLOUDFLARE_API_TOKEN secret is set. After the cutover is confirmed, switch the
# trigger to `push` (paths: website/**) and retire .github/workflows/pages.yml.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: node website/build.mjs
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: website/edge
