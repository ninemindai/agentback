name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR.
# `github.workflow` and `github.ref` are not user-controlled; they are
# only used as part of the concurrency group key (string identity),
# never interpolated into shell commands, so no injection risk.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build + test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22.13', '24']

    # Redis backs the @agentback/messaging-bullmq conformance tests;
    # they skip cleanly when REDIS_URL is unset (local runs without Redis).
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # Version comes from package.json's `packageManager` field.

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck client bundles
        run: pnpm typecheck:client

      - name: Test
        run: pnpm test

  # Proves the create-agentback templates aren't stale: scaffold each as
  # a throwaway workspace member and build + test it against the current
  # packages. Registry-install validation is gated on publish (P2-1).
  templates:
    name: validate templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.13'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Validate templates
        run: node scripts/validate-templates.mjs
