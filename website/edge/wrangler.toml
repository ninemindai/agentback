#:schema node_modules/wrangler/config-schema.json
# Cloudflare Worker that fronts the agentback.dev GitHub Pages origin to add
# markdown content negotiation (Accept: text/markdown). See ./README.md.

name = "agentback-web"
main = "src/markdown-negotiation.js"
compatibility_date = "2026-06-20"

# No *.workers.dev URL — this Worker only ever runs on the custom domain route.
workers_dev = false

# Scope to negotiable HTML documents only — the homepage and docs pages. Asset
# requests (CSS, fonts, images, blog) skip the Worker entirely, so invocations
# track pageviews (well within the free 100k/day) instead of total requests.
# The zone must already exist in the Cloudflare account.
routes = [
  {pattern = "agentback.dev/", zone_name = "agentback.dev"},
  {pattern = "agentback.dev/docs/*", zone_name = "agentback.dev"},
]
