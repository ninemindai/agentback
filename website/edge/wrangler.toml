#:schema node_modules/wrangler/config-schema.json
# Cloudflare Worker that fronts the agentback.dev GitHub Pages origin to add
# markdown content negotiation (Accept: text/markdown). See ./README.md.

name = "agentback-web"
main = "src/markdown-negotiation.js"
compatibility_date = "2026-06-20"

# No *.workers.dev URL — this Worker only ever runs on the custom domain route.
workers_dev = false

# Full-site route. A path-scoped route can't reliably cover the homepage:
# Cloudflare route matching is query-sensitive, so an exact `agentback.dev/`
# misses cache-busted requests (e.g. the isitagentready scanner's `/?…`), and
# only a `*` wildcard matches a URL with a query string. The Worker stays cheap
# on the asset hot path — non-markdown requests hit one header check and return
# the origin immediately, and the whole handler is fail-safe (errors fall
# through to origin). Invocations track total requests but sit well inside the
# free 100k/day for this site; bump to Workers Paid ($5/mo) if traffic grows.
# The zone must already exist and be proxied (orange-cloud) in the account.
routes = [
  {pattern = "agentback.dev/*", zone_name = "agentback.dev"},
]
