#:schema node_modules/wrangler/config-schema.json
# Cloudflare Worker that SERVES agentback.dev from Workers Static Assets and
# adds markdown content negotiation (Accept: text/markdown). See ./README.md.
#
# This replaces the GitHub-Pages-origin design: `website/dist` is uploaded as
# the Worker's static asset set (the ASSETS binding) and served directly at the
# edge — no GitHub origin, no second hop. Deploying this Worker on the existing
# `agentback.dev/*` route swaps asset-serving in *without any DNS change* (the
# Worker short-circuits before the proxied origin is ever reached), so the
# cutover is a single `wrangler deploy` and is instantly reversible by
# redeploying the previous proxy Worker.

name = "agentback-web"
main = "src/markdown-negotiation.js"
compatibility_date = "2026-06-20"
account_id = "8c60d6f6b0408a55768ec315042db967"

# No *.workers.dev URL — this Worker only runs on the agentback.dev route.
workers_dev = false

# Full-site route (kept from the proxy design). A path-scoped route can't
# reliably cover the homepage: Cloudflare route matching is query-sensitive, so
# an exact `agentback.dev/` misses cache-busted requests (the isitagentready
# scanner's `/?…`) — only a `*` wildcard matches a URL with a query string. The
# Worker stays cheap: non-markdown GETs hit one header check then serve the
# asset; the whole handler is fail-safe. Invocations track total requests but
# sit well inside the free 100k/day; bump to Workers Paid ($5/mo) if traffic
# grows. The zone must be active and proxied (orange-cloud) in the account.
# (Top-level key — must precede the [assets] table in TOML.)
routes = [
  {pattern = "agentback.dev/*", zone_name = "agentback.dev"},
  # www is handled by the Worker (301 → apex) so it no longer depends on the
  # GitHub Pages origin for that redirect.
  {pattern = "www.agentback.dev/*", zone_name = "agentback.dev"},
]

# Upload website/dist as the static asset set. The Worker reads from this
# binding (env.ASSETS) for both normal asset serving and markdown twins.
#
# run_worker_first = true is REQUIRED for negotiation: by default Cloudflare
# serves a matching static asset directly and never invokes the Worker, so the
# Accept: text/markdown branch would be dead code. With it true the Worker runs
# first on every request, then serves the asset via env.ASSETS for the normal
# case. (Could be scoped to ["/", "/docs/*"] to keep asset requests off the
# Worker, but only after verifying that pattern still matches the scanner's
# cache-busted `/?…` homepage — route/path matching here is the same hazard
# that bit the zone-route version.)
[assets]
directory = "../dist"
binding = "ASSETS"
run_worker_first = true
