      <g>
        <rect x="150" y="360" width="90" height="34" rx="8" fill="#ffffff" stroke="#6d4ca8" stroke-width="1.5"/>
        <rect x="155" y="366" width="4" height="22" rx="2" fill="#6d4ca8"/>
        <text x="197" y="381">mcp</text>
      </g>

      <!-- agent-facing substrates -->
      <g>
        <rect x="500" y="270" width="144" height="34" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
        <rect x="505" y="276" width="4" height="22" rx="2" fill="#0f6b4f"/>
        <text x="574" y="291">messaging-bullmq</text>
      </g>
      <g>
        <rect x="658" y="270" width="90" height="34" rx="8" fill="#ffffff" stroke="#6d4ca8" stroke-width="1.5"/>
        <rect x="663" y="276" width="4" height="22" rx="2" fill="#6d4ca8"/>
        <text x="705" y="291">mcp-host</text>
      </g>
      <g>
        <rect x="500" y="360" width="90" height="34" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
        <rect x="505" y="366" width="4" height="22" rx="2" fill="#0f6b4f"/>
        <text x="547" y="381">messaging</text>
      </g>
      <g>
        <rect x="606" y="360" width="104" height="34" rx="8" fill="#ffffff" stroke="#6d4ca8" stroke-width="1.5"/>
        <rect x="611" y="366" width="4" height="22" rx="2" fill="#6d4ca8"/>
        <text x="658" y="381">mcp-client</text>
      </g>
      <g>
        <rect x="726" y="360" width="90" height="34" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
        <rect x="731" y="366" width="4" height="22" rx="2" fill="#0f6b4f"/>
        <text x="771" y="381">plugin</text>
      </g>

      <!-- core / context (pill) -->
      <g>
        <rect x="330" y="442" width="140" height="34" rx="17" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
        <text x="400" y="463">core / context</text>
      </g>
    </g>
  </g>
</svg>
