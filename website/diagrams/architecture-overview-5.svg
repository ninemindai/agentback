      <g>
        <rect x="44" y="270" width="90" height="34" rx="8" fill="#ffffff" stroke="#087b8c" stroke-width="1.5"/>
        <rect x="49" y="276" width="4" height="22" rx="2" fill="#087b8c"/>
        <text x="91" y="291">rest</text>
      </g>
      <g>
        <rect x="44" y="360" width="90" height="34" rx="8" fill="#ffffff" stroke="#087b8c" stroke-width="1.5"/>
        <rect x="49" y="366" width="4" height="22" rx="2" fill="#087b8c"/>
        <text x="91" y="381">openapi</text>
