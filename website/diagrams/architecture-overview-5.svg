      <g>
        <rect x="160" y="90" width="256" height="34" rx="8" fill="#ffffff" stroke="#b43b55" stroke-width="1.5"/>
        <rect x="165" y="96" width="4" height="22" rx="2" fill="#b43b55"/>
        <text x="290" y="111">authentication / authorization</text>
      </g>
      <g>
        <rect x="446" y="90" width="160" height="34" rx="8" fill="#ffffff" stroke="#b43b55" stroke-width="1.5"/>
        <rect x="451" y="96" width="4" height="22" rx="2" fill="#b43b55"/>
        <text x="528" y="111">metering / payments</text>
      </g>
      <g>
        <rect x="636" y="90" width="128" height="34" rx="8" fill="#ffffff" stroke="#9b6b16" stroke-width="1.5"/>
        <rect x="641" y="96" width="4" height="22" rx="2" fill="#9b6b16"/>
        <text x="702" y="111">extension-otel</text>
