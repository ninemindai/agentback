<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560" role="img" aria-label="Payment rails: gating rails (paymentMiddleware to x402 HTTP 402 and MPP sessions, PaidMCPServer to tool error challenge) settle through an external facilitator; the reporting rail (StripeMeterSink) forwards usage to Stripe metered billing">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 z" fill="#8a948d"/>
    </marker>
  </defs>

  <!-- group: gating rails -->
  <rect x="16" y="36" width="584" height="288" rx="12" fill="rgba(15,107,79,0.03)" stroke="#c5ccc4" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="32" y="60" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1" fill="#5a645e">GATING RAILS — PAYMENTRAIL.AUTHORIZE (REAL TIME)</text>

  <!-- group: reporting rail -->
  <rect x="632" y="36" width="232" height="288" rx="12" fill="rgba(15,107,79,0.03)" stroke="#c5ccc4" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="648" y="58" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1" fill="#5a645e">REPORTING RAIL —</text>
  <text x="648" y="74" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1" fill="#5a645e">A USAGESINK (POST-HOC)</text>

  <!-- edges -->
  <g stroke="#8a948d" stroke-width="1.4" fill="none">
    <path d="M167,148 L167,189 L121,189 L121,226" marker-end="url(#arr)"/>
    <path d="M167,148 L167,189 L296,189 L296,226" marker-end="url(#arr)"/>
    <path d="M442,148 L442,222" marker-end="url(#arr)"/>
    <path d="M749,148 L749,226" marker-end="url(#arr)"/>
    <path d="M121,282 L121,426" stroke-dasharray="4,4" marker-end="url(#arr)"/>
    <path d="M296,282 L296,426" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  </g>

  <!-- edge label chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#5a645e" text-anchor="middle">
    <rect x="98" y="349" width="46" height="14" rx="3" fill="#f7f8f5"/>
    <text x="121" y="359.5">settle</text>
    <rect x="273" y="349" width="46" height="14" rx="3" fill="#f7f8f5"/>
    <text x="296" y="359.5">settle</text>
  </g>

  <!-- paymentMiddleware (rose) -->
  <g>
    <rect x="70" y="96" width="190" height="52" rx="8" fill="#ffffff" stroke="#b43b55" stroke-width="1.5"/>
    <rect x="74" y="102" width="4" height="40" rx="2" fill="#b43b55"/>
    <text x="167" y="118" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b" text-anchor="middle">paymentMiddleware</text>
    <text x="167" y="134" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e" text-anchor="middle">(REST)</text>
  </g>

  <!-- PaidMCPServer (rose) -->
  <g>
    <rect x="350" y="96" width="180" height="52" rx="8" fill="#ffffff" stroke="#b43b55" stroke-width="1.5"/>
    <rect x="354" y="102" width="4" height="40" rx="2" fill="#b43b55"/>
    <text x="442" y="118" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b" text-anchor="middle">PaidMCPServer</text>
    <text x="442" y="134" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e" text-anchor="middle">(MCP)</text>
  </g>

  <!-- x402 (rose) -->
  <g>
    <rect x="44" y="230" width="154" height="52" rx="8" fill="#ffffff" stroke="#b43b55" stroke-width="1.5"/>
    <rect x="48" y="236" width="4" height="40" rx="2" fill="#b43b55"/>
    <text x="123" y="252" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b" text-anchor="middle">x402</text>
    <text x="123" y="268" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e" text-anchor="middle">→ HTTP 402</text>
  </g>

  <!-- MPP (rose) -->
  <g>
    <rect x="224" y="230" width="140" height="52" rx="8" fill="#ffffff" stroke="#b43b55" stroke-width="1.5"/>
    <rect x="228" y="236" width="4" height="40" rx="2" fill="#b43b55"/>
    <text x="296" y="252" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b" text-anchor="middle">MPP</text>
    <text x="296" y="268" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e" text-anchor="middle">→ sessions</text>
  </g>

  <!-- tool error challenge (rose) -->
  <g>
    <rect x="394" y="226" width="186" height="66" rx="8" fill="#ffffff" stroke="#b43b55" stroke-width="1.5"/>
    <rect x="398" y="232" width="4" height="54" rx="2" fill="#b43b55"/>
    <text x="489" y="248" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b" text-anchor="middle">tool error</text>
    <text x="489" y="264" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e" text-anchor="middle">_meta: challenge →</text>
    <text x="489" y="278" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e" text-anchor="middle">pay + retry</text>
  </g>

  <!-- StripeMeterSink (amber) -->
  <g>
    <rect x="662" y="96" width="170" height="52" rx="8" fill="#ffffff" stroke="#9b6b16" stroke-width="1.5"/>
    <rect x="666" y="102" width="4" height="40" rx="2" fill="#9b6b16"/>
    <text x="749" y="126" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b" text-anchor="middle">StripeMeterSink</text>
  </g>

  <!-- Stripe metered billing (amber) -->
  <g>
    <rect x="648" y="230" width="200" height="60" rx="8" fill="#ffffff" stroke="#9b6b16" stroke-width="1.5"/>
    <rect x="652" y="236" width="4" height="48" rx="2" fill="#9b6b16"/>
    <text x="750" y="254" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" font-weight="600" fill="#17201b" text-anchor="middle">Stripe metered billing</text>
    <text x="750" y="272" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e" text-anchor="middle">→ invoice</text>
  </g>

  <!-- facilitator / processor (neutral, external) -->
  <g>
    <rect x="101" y="430" width="210" height="60" rx="8" fill="#ffffff" stroke="#d9ded6" stroke-width="1.5"/>
    <rect x="105" y="436" width="4" height="48" rx="2" fill="#c5ccc4"/>
    <text x="208" y="454" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b" text-anchor="middle">facilitator / processor</text>
    <text x="208" y="472" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e" text-anchor="middle">(external)</text>
  </g>
</svg>
