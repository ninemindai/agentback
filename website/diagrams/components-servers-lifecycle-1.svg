<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 390" width="900" height="390" role="img" aria-label="app.component() contributes controllers, classes, providers, servers, and lifecycle observers, all landing in the one Application context">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 z" fill="#8a948d"/>
    </marker>
  </defs>

  <!-- fan-out bus from component -->
  <line x1="450" y1="66" x2="450" y2="112" stroke="#8a948d" stroke-width="1.4"/>
  <line x1="92" y1="112" x2="780" y2="112" stroke="#8a948d" stroke-width="1.4"/>
  <line x1="92" y1="112" x2="92" y2="179" stroke="#8a948d" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="254" y1="112" x2="254" y2="179" stroke="#8a948d" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="411" y1="112" x2="411" y2="179" stroke="#8a948d" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="583" y1="112" x2="583" y2="179" stroke="#8a948d" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="780" y1="112" x2="780" y2="179" stroke="#8a948d" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- converge bus into the Application context -->
  <line x1="92" y1="236" x2="92" y2="282" stroke="#8a948d" stroke-width="1.4"/>
  <line x1="254" y1="236" x2="254" y2="282" stroke="#8a948d" stroke-width="1.4"/>
  <line x1="411" y1="236" x2="411" y2="282" stroke="#8a948d" stroke-width="1.4"/>
  <line x1="583" y1="236" x2="583" y2="282" stroke="#8a948d" stroke-width="1.4"/>
  <line x1="780" y1="236" x2="780" y2="282" stroke="#8a948d" stroke-width="1.4"/>
  <line x1="92" y1="282" x2="780" y2="282" stroke="#8a948d" stroke-width="1.4"/>
  <line x1="450" y1="282" x2="450" y2="329" stroke="#8a948d" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- node: app.component() (green) -->
  <rect x="320" y="18" width="260" height="48" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
  <rect x="326" y="26" width="4" height="32" rx="2" fill="#0f6b4f"/>
  <text x="452" y="46.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="600" fill="#17201b">app.component(MyComponent)</text>

  <!-- node: controllers[] (cyan) -->
  <rect x="17" y="180" width="150" height="56" rx="8" fill="#ffffff" stroke="#087b8c" stroke-width="1.5"/>
  <rect x="23" y="188" width="4" height="40" rx="2" fill="#087b8c"/>
  <text x="94" y="204" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="600" fill="#17201b">controllers[]</text>
  <text x="94" y="220" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#5a645e">tagged restController</text>

  <!-- node: classes{} (green) -->
  <rect x="189" y="180" width="130" height="56" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
  <rect x="195" y="188" width="4" height="40" rx="2" fill="#0f6b4f"/>
  <text x="256" y="204" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="600" fill="#17201b">classes{}</text>
  <text x="256" y="220" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e">bound by key</text>

  <!-- node: providers{} (green) -->
  <rect x="341" y="180" width="140" height="56" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
  <rect x="347" y="188" width="4" height="40" rx="2" fill="#0f6b4f"/>
  <text x="413" y="204" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="600" fill="#17201b">providers{}</text>
  <text x="413" y="220" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e">bound by key</text>

  <!-- node: servers{} (cyan) -->
  <rect x="503" y="180" width="160" height="56" rx="8" fill="#ffffff" stroke="#087b8c" stroke-width="1.5"/>
  <rect x="509" y="188" width="4" height="40" rx="2" fill="#087b8c"/>
  <text x="585" y="204" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="600" fill="#17201b">servers{}</text>
  <text x="585" y="220" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#5a645e">bound under servers.*</text>

  <!-- node: lifeCycleObservers[] (green) -->
  <rect x="685" y="180" width="190" height="56" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
  <rect x="691" y="188" width="4" height="40" rx="2" fill="#0f6b4f"/>
  <text x="782" y="204" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="600" fill="#17201b">lifeCycleObservers[]</text>
  <text x="782" y="220" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e">start/stop hooks</text>

  <!-- node: Application context (green) -->
  <rect x="290" y="330" width="320" height="52" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
  <rect x="296" y="338" width="4" height="36" rx="2" fill="#0f6b4f"/>
  <text x="452" y="360.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b">the one Application context</text>
</svg>
