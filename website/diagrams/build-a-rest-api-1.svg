<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 268" width="940" height="268" role="img" aria-label="REST pipeline: Zod schemas to @api controller, registered on the app, started, serving routes with validation plus /openapi.json and /explorer">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 z" fill="#8a948d"/>
    </marker>
  </defs>

  <!-- row 1 edges -->
  <line x1="150" y1="60" x2="208" y2="60" stroke="#8a948d" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="395" y1="60" x2="453" y2="60" stroke="#8a948d" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="655" y1="60" x2="713" y2="60" stroke="#8a948d" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- branch edges -->
  <path d="M817,84 L817,202" fill="none" stroke="#8a948d" stroke-width="1.4" marker-end="url(#arrow)"/>
  <path d="M745,84 L745,144 L195,144 L195,202" fill="none" stroke="#8a948d" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="270" y1="232" x2="368" y2="232" stroke="#8a948d" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- node: Zod schemas (amber) -->
  <rect x="10" y="36" width="140" height="48" rx="8" fill="#ffffff" stroke="#9b6b16" stroke-width="1.5"/>
  <rect x="16" y="44" width="4" height="32" rx="2" fill="#9b6b16"/>
  <text x="82" y="64.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b">Zod schemas</text>

  <!-- node: @api controller (cyan) -->
  <rect x="210" y="32" width="185" height="56" rx="8" fill="#ffffff" stroke="#087b8c" stroke-width="1.5"/>
  <rect x="216" y="40" width="4" height="40" rx="2" fill="#087b8c"/>
  <text x="304" y="56" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b">@api controller</text>
  <text x="304" y="72" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e">@get/@post + schemas</text>

  <!-- node: registration (green) -->
  <rect x="455" y="36" width="200" height="48" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
  <rect x="461" y="44" width="4" height="32" rx="2" fill="#0f6b4f"/>
  <text x="557" y="64.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="600" fill="#17201b">app.restController(C)</text>

  <!-- node: start (green) -->
  <rect x="715" y="36" width="205" height="48" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
  <rect x="721" y="44" width="4" height="32" rx="2" fill="#0f6b4f"/>
  <text x="819" y="64.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="600" fill="#17201b">RestApplication.start()</text>

  <!-- node: /openapi.json (amber) -->
  <rect x="120" y="208" width="150" height="48" rx="8" fill="#ffffff" stroke="#9b6b16" stroke-width="1.5"/>
  <rect x="126" y="216" width="4" height="32" rx="2" fill="#9b6b16"/>
  <text x="197" y="236.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b">/openapi.json</text>

  <!-- node: /explorer (cyan) -->
  <rect x="370" y="204" width="190" height="56" rx="8" fill="#ffffff" stroke="#087b8c" stroke-width="1.5"/>
  <rect x="376" y="212" width="4" height="40" rx="2" fill="#087b8c"/>
  <text x="467" y="228" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b">/explorer</text>
  <text x="467" y="244" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e">Swagger UI</text>

  <!-- node: RestServer (cyan) -->
  <rect x="702" y="204" width="230" height="56" rx="8" fill="#ffffff" stroke="#087b8c" stroke-width="1.5"/>
  <rect x="708" y="212" width="4" height="40" rx="2" fill="#087b8c"/>
  <text x="819" y="228" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b">RestServer</text>
  <text x="819" y="244" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e">routes + validation</text>
</svg>
