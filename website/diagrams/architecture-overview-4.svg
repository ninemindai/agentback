<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400" role="img" aria-label="Discovery: decorated classes become tagged bindings; app.start() lets each server findByTag and read metadata">
  <!-- Source: docs/architecture/overview.md mermaid block 4 ("How discovery works") -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 z" fill="#8a948d"/>
    </marker>
  </defs>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">

    <!-- ============ edges ============ -->
    <g fill="none" stroke="#8a948d" stroke-width="1.4">
      <!-- decorated class -> binding -->
      <path d="M196,66 L396,66" marker-end="url(#arrow)"/>
      <!-- app.start() -> RestServer -->
      <path d="M196,286 L330,286 L330,206 L396,206" marker-end="url(#arrow)"/>
      <!-- app.start() -> MCPServer -->
      <path d="M196,306 L330,306 L330,356 L396,356" marker-end="url(#arrow)"/>
      <!-- RestServer -> binding (findByTag) -->
      <path d="M460,180 L460,100" marker-end="url(#arrow)"/>
      <!-- MCPServer -> binding (findByTag) -->
      <path d="M560,346 L600,346 L600,100" marker-end="url(#arrow)"/>
      <!-- RestServer -> routes -->
      <path d="M560,206 L696,206" marker-end="url(#arrow)"/>
      <!-- MCPServer -> SDK registrations -->
      <path d="M560,356 L696,356" marker-end="url(#arrow)"/>
    </g>

    <!-- edge label chips -->
    <g font-size="10" fill="#5a645e" text-anchor="middle">
      <rect x="198" y="58" width="196" height="16" fill="#f7f8f5"/>
      <text x="296" y="70">app.restController / app.service</text>

      <rect x="377" y="130" width="166" height="16" fill="#f7f8f5"/>
      <text x="460" y="142">findByTag('restController')</text>

      <rect x="529" y="252" width="142" height="16" fill="#f7f8f5"/>
      <text x="600" y="264">findByTag('mcpServer')</text>

      <rect x="583" y="192" width="94" height="28" fill="#f7f8f5"/>
      <text x="630" y="203">read decorator</text>
      <text x="630" y="216">metadata</text>

      <rect x="572" y="342" width="112" height="28" fill="#f7f8f5"/>
      <text x="628" y="353">reflect @tool /</text>
      <text x="628" y="366">@resource/@prompt</text>
    </g>

    <!-- ============ nodes ============ -->
    <!-- decorated class (neutral) -->
    <g>
      <rect x="16" y="40" width="180" height="52" rx="8" fill="#ffffff" stroke="#d9ded6" stroke-width="1.5"/>
      <rect x="21" y="46" width="4" height="40" rx="2" fill="#8a948d"/>
      <text x="106" y="62" font-size="13" font-weight="600" fill="#17201b" text-anchor="middle">@api / @mcpServer</text>
      <text x="106" y="79" font-size="10.5" fill="#5a645e" text-anchor="middle">decorated class</text>
    </g>
    <!-- binding + tag (green) -->
    <g>
      <rect x="400" y="36" width="220" height="60" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
      <rect x="405" y="42" width="4" height="48" rx="2" fill="#0f6b4f"/>
      <text x="510" y="62" font-size="13" font-weight="600" fill="#17201b" text-anchor="middle">binding + tag</text>
      <text x="510" y="80" font-size="10.5" fill="#5a645e" text-anchor="middle">restController · mcpServer</text>
    </g>
    <!-- app.start() (green) -->
    <g>
      <rect x="16" y="270" width="180" height="52" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
      <rect x="21" y="276" width="4" height="40" rx="2" fill="#0f6b4f"/>
      <text x="106" y="300" font-size="13" font-weight="600" fill="#17201b" text-anchor="middle">app.start()</text>
    </g>
    <!-- RestServer (cyan) -->
    <g>
      <rect x="400" y="180" width="160" height="52" rx="8" fill="#ffffff" stroke="#087b8c" stroke-width="1.5"/>
      <rect x="405" y="186" width="4" height="40" rx="2" fill="#087b8c"/>
      <text x="480" y="210" font-size="13" font-weight="600" fill="#17201b" text-anchor="middle">RestServer</text>
    </g>
    <!-- MCPServer (violet) -->
    <g>
      <rect x="400" y="330" width="160" height="52" rx="8" fill="#ffffff" stroke="#6d4ca8" stroke-width="1.5"/>
      <rect x="405" y="336" width="4" height="40" rx="2" fill="#6d4ca8"/>
      <text x="480" y="360" font-size="13" font-weight="600" fill="#17201b" text-anchor="middle">MCPServer</text>
    </g>
    <!-- routes + Zod bundles (amber) -->
    <g>
      <rect x="700" y="180" width="190" height="52" rx="8" fill="#ffffff" stroke="#9b6b16" stroke-width="1.5"/>
      <rect x="705" y="186" width="4" height="40" rx="2" fill="#9b6b16"/>
      <text x="795" y="202" font-size="13" font-weight="600" fill="#17201b" text-anchor="middle">routes</text>
      <text x="795" y="219" font-size="10.5" fill="#5a645e" text-anchor="middle">+ Zod bundles</text>
    </g>
    <!-- SDK registrations (violet) -->
    <g>
      <rect x="700" y="330" width="190" height="52" rx="8" fill="#ffffff" stroke="#6d4ca8" stroke-width="1.5"/>
      <rect x="705" y="336" width="4" height="40" rx="2" fill="#6d4ca8"/>
      <text x="795" y="352" font-size="13" font-weight="600" fill="#17201b" text-anchor="middle">SDK registrations</text>
      <text x="795" y="369" font-size="10.5" fill="#5a645e" text-anchor="middle">tools · resources · prompts</text>
    </g>
  </g>
</svg>
