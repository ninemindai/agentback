<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" width="840" height="400" role="img" aria-label="One RestApplication context holding shared services, REST controllers, and MCP tools; controllers feed the RestServer, tools feed the MCPServer, both inject the same services">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 z" fill="#8a948d"/>
    </marker>
  </defs>

  <!-- app context group -->
  <rect x="100" y="16" width="640" height="248" rx="12" fill="rgba(15,107,79,0.03)" stroke="#c5ccc4" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="120" y="42" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1" fill="#5a645e">ONE RESTAPPLICATION (CONTEXT)</text>

  <!-- dashed @inject edges -->
  <line x1="280" y1="184" x2="362" y2="125" stroke="#8a948d" stroke-width="1.4" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <line x1="550" y1="184" x2="478" y2="125" stroke="#8a948d" stroke-width="1.4" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <rect x="296" y="146" width="50" height="16" rx="4" fill="#f7f8f5"/>
  <text x="321" y="157.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#5a645e">@inject</text>
  <rect x="489" y="146" width="50" height="16" rx="4" fill="#f7f8f5"/>
  <text x="514" y="157.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#5a645e">@inject</text>

  <!-- solid edges to servers -->
  <line x1="240" y1="240" x2="240" y2="334" stroke="#8a948d" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="590" y1="240" x2="590" y2="334" stroke="#8a948d" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- node: shared services (green) -->
  <rect x="300" y="68" width="240" height="56" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
  <rect x="306" y="76" width="4" height="40" rx="2" fill="#0f6b4f"/>
  <text x="422" y="92" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b">services.*</text>
  <text x="422" y="108" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e">shared business logic</text>

  <!-- node: controllers (cyan) -->
  <rect x="140" y="184" width="200" height="56" rx="8" fill="#ffffff" stroke="#087b8c" stroke-width="1.5"/>
  <rect x="146" y="192" width="4" height="40" rx="2" fill="#087b8c"/>
  <text x="242" y="208" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b">controllers.*</text>
  <text x="242" y="224" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e">[restController]</text>

  <!-- node: tools (violet) -->
  <rect x="480" y="184" width="220" height="56" rx="8" fill="#ffffff" stroke="#6d4ca8" stroke-width="1.5"/>
  <rect x="486" y="192" width="4" height="40" rx="2" fill="#6d4ca8"/>
  <text x="592" y="208" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b">tools</text>
  <text x="592" y="224" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e">[mcpServer]</text>

  <!-- node: RestServer (cyan) -->
  <rect x="105" y="336" width="270" height="56" rx="8" fill="#ffffff" stroke="#087b8c" stroke-width="1.5"/>
  <rect x="111" y="344" width="4" height="40" rx="2" fill="#087b8c"/>
  <text x="242" y="360" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b">RestServer</text>
  <text x="242" y="376" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e">HTTP + /openapi.json + /explorer</text>

  <!-- node: MCPServer (violet) -->
  <rect x="460" y="336" width="260" height="56" rx="8" fill="#ffffff" stroke="#6d4ca8" stroke-width="1.5"/>
  <rect x="466" y="344" width="4" height="40" rx="2" fill="#6d4ca8"/>
  <text x="592" y="360" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b">MCPServer</text>
  <text x="592" y="376" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e">stdio + /mcp-inspector</text>
</svg>
