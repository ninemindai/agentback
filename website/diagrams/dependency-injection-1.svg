<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480" role="img" aria-label="The Application is a Context holding a binding registry; app.get resolves a binding and weaves its @inject dependencies from sibling bindings">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 z" fill="#8a948d"/>
    </marker>
  </defs>

  <!-- association: Application — registry (no arrow) -->
  <line x1="635" y1="64" x2="635" y2="110" stroke="#8a948d" stroke-width="1.4"/>

  <!-- binding registry group -->
  <rect x="400" y="110" width="470" height="362" rx="12" fill="rgba(15,107,79,0.03)" stroke="#c5ccc4" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="424" y="136" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1" fill="#5a645e">BINDING REGISTRY</text>

  <!-- resolve arrow -->
  <line x1="270" y1="264" x2="423" y2="264" stroke="#8a948d" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="274" y="256" width="116" height="16" rx="4" fill="#f7f8f5"/>
  <text x="332" y="267.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#5a645e">resolves + injects</text>

  <!-- dashed @inject edge B2 -> B1 -->
  <line x1="500" y1="240" x2="500" y2="202" stroke="#8a948d" stroke-width="1.4" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <rect x="512" y="211" width="104" height="16" rx="4" fill="#f7f8f5"/>
  <text x="564" y="222.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#5a645e">@inject('clock')</text>

  <!-- node: Application (green) -->
  <rect x="485" y="16" width="300" height="48" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
  <rect x="491" y="24" width="4" height="32" rx="2" fill="#0f6b4f"/>
  <text x="637" y="44.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b">Application (a Context)</text>

  <!-- node: app.get() call site (green) -->
  <rect x="20" y="240" width="250" height="48" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
  <rect x="26" y="248" width="4" height="32" rx="2" fill="#0f6b4f"/>
  <text x="147" y="268.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="600" fill="#17201b">app.get('services.Greeter')</text>

  <!-- binding: 'clock' (green) -->
  <rect x="425" y="150" width="420" height="48" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
  <rect x="431" y="158" width="4" height="32" rx="2" fill="#0f6b4f"/>
  <text x="637" y="178.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b">'clock' &#8594; Clock</text>

  <!-- binding: services.Greeter (green) -->
  <rect x="425" y="240" width="420" height="48" rx="8" fill="#ffffff" stroke="#0f6b4f" stroke-width="1.5"/>
  <rect x="431" y="248" width="4" height="32" rx="2" fill="#0f6b4f"/>
  <text x="637" y="268.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b">services.Greeter &#8594; Greeter</text>

  <!-- binding: controllers.Foo (cyan) -->
  <rect x="425" y="318" width="420" height="56" rx="8" fill="#ffffff" stroke="#087b8c" stroke-width="1.5"/>
  <rect x="431" y="326" width="4" height="40" rx="2" fill="#087b8c"/>
  <text x="637" y="342" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b">controllers.Foo &#8594; Foo</text>
  <text x="637" y="358" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e">[tag: restController]</text>

  <!-- binding: servers.RestServer (cyan) -->
  <rect x="425" y="400" width="420" height="56" rx="8" fill="#ffffff" stroke="#087b8c" stroke-width="1.5"/>
  <rect x="431" y="408" width="4" height="40" rx="2" fill="#087b8c"/>
  <text x="637" y="424" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#17201b">servers.RestServer &#8594; RestServer</text>
  <text x="637" y="440" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#5a645e">[tag: server]</text>
</svg>
