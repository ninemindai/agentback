<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- AgentBack mark: one schema, every boundary.
       A single source node fans out to three boundary tiles. -->
  <rect x="2" y="2" width="92" height="92" rx="22" fill="#17201b"/>
  <!-- fan edges -->
  <path d="M34 48 H47 M47 48 V26 H56 M47 48 H56 M47 48 V70 H56"
        fill="none" stroke="#4d5a52" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- source node (schema) -->
  <circle cx="29" cy="48" r="9.5" fill="#0f6b4f"/>
  <circle cx="29" cy="48" r="4" fill="#9fe3c6"/>
  <!-- boundary tiles -->
  <rect x="56" y="19" width="14" height="14" rx="4" fill="#3ec89a"/>
  <rect x="56" y="41" width="14" height="14" rx="4" fill="#62d0e3"/>
  <rect x="56" y="63" width="14" height="14" rx="4" fill="#c0a4f2"/>
</svg>
